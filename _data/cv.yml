    Publications:
      - title: "Spotting the Fakes: A Deep Dive into GAN-Generated Face Detection"
        authors:
          - Ting Yu Tsai, Liangqiao Gui, Yineng Chen, Li Lin, Shu Hu, Connie W. Tsao, Xin Li, Shao Lin, Ming-Ching Chang, Hongtu Zhu, and Xin Wang
        publisher: ACM Transactions on Multimedia Computing, Communications and Applications
        releaseDate: 2025-07-24
        url: https://dl.acm.org/doi/10.1145/3742786
        summary: A comprehensive survey of GAN-generated face detection methods, organizing the literature into deep learning, physics-based, and physiology-based approaches while analyzing datasets, evaluation protocols, and key challenges in detecting synthetic faces.

      - title: "IntelliCardiac: An Intelligent Platform for Cardiac Image Segmentation and Classification"
        authors:
          - Ting Yu Tsai, An Yu, Meghana Spurthi Maadugundu, Ishrat Jahan Mohima, Umme Habiba Barsha, Mei-Hwa F. Chen, Balakrishnan Prabhakaran, and Ming-Ching Chang
        publisher: In 2025 IEEE 8th International Conference on Multimedia Information Processing and Retrieval (MIPR)
        releaseDate: 2025-05-05
        url: https://doi.org/10.1109/MIPR67560.2025.00026
        summary: A web-based AI platform for 4D cardiac image analysis that integrates automatic heart-structure segmentation with a two-stage disease classification pipeline, enabling real-time visualization and accurate diagnosis across five cardiac conditions.

      - title: "UU-Mamba: Uncertainty-aware U-Mamba for Cardiac Image Segmentation"
        authors:
          - Ting Yu Tsai, Li Lin, Shu Hu, Ming-Ching Chang, Hongtu Zhu, and Xin Wang
        publisher: In 2024 IEEE 7th International Conference on Multimedia Information Processing and Retrieval (MIPR)
        releaseDate: 2024-05-25
        url: https://arxiv.org/abs/2405.17496
        summary: An uncertainty-aware cardiac image segmentation framework that enhances U-Mamba with Sharpness-Aware Minimization and a composite uncertainty-guided loss to improve robustness, generalization, and segmentation accuracy in cardiac MRI.

      - title: "Based on DICOM RT Structure and Multiple Loss Function Deep Learning Algorithm in Organ Segmentation of Head and Neck Image"
        authors:
          - Ya-Ju Hsieh, Hsien-Chun Tseng, Chiun-Li Chin, and Yu-Hsiang Shao, Ting-Yu Tsai
        publisher: In Future Trends in Biomedical and Health Informatics and Cybersecurity in Medical Devices
        releaseDate: 2019-09-28
        url: https://doi.org/10.1007/978-3-030-30636-6_58
        summary: A deep learning approach for head-and-neck organ segmentation that leverages DICOM RT structure information and a multi-loss GAN framework to improve automatic delineation accuracy and reduce false positives in CT-based radiotherapy planning.
      
      - title: "Facial skin image classification system using Convolutional Neural Networks deep learning algorithm"
        authors:
          - Chiun-Li Chin, Ming-Chieh Chin, Ting-Yu Tsai, and Wei-En Chen
        publisher: In 2018 9th International Conference on Awareness Science and Technology (iCAST)
        releaseDate: 2018-09-01
        url: https://doi.org/10.1109/ICAwST.2018.8517246
        summary: A CNN-based facial skin image classification system that applies deep learning to automatically identify facial skin conditions from images, demonstrating the potential of AI-assisted dermatological screening.
      
