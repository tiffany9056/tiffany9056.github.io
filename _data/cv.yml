    Publications:
      - title: "ReDiPrune: Relevance-Diversity Pre-Projection Token Pruning for Efficient Multimodal LLMs"
        authors:
          - An Yu, Ting Yu Tsai, Zhenfei Zhang, Weiheng Lu, Felix X.-F. Ye, and Ming-Ching Chang
        publisher: arXiv preprint
        releaseDate: 2026-03-31
        url: https://arxiv.org/abs/2603.24680
        summary: Developed a training-free token pruning framework for multimodal LLMs that improves inference efficiency by pruning visual tokens before the vision-language projector while preserving query-relevant and non-redundant information.

      - title: "RatSeizure: A Benchmark and Saliency-Context Transformer for Rat Seizure Localization"
        authors:
          - Ting Yu Tsai, An Yu, Lucy Lee, Felix X.-F. Ye, Damian S. Shin, Tzu-Jen Kao, Xin Li, and Ming-Ching Chang
        publisher: arXiv preprint
        releaseDate: 2026-03-31
        url: https://arxiv.org/abs/2603.26780
        summary: Built a benchmark and deep learning framework for rat seizure localization from video, supporting scalable and reproducible behavioral analysis through computer vision and temporal modeling.

      - title: "IntelliCardiac: An Intelligent Platform for Cardiac Image Segmentation and Classification"
        authors:
          - Ting Yu Tsai, An Yu, Meghana Spurthi Maadugundu, Ishrat Jahan Mohima, Umme Habiba Barsha, Mei-Hwa F. Chen, Balakrishnan Prabhakaran, and Ming-Ching Chang
        publisher: In 2025 IEEE 8th International Conference on Multimedia Information Processing and Retrieval (MIPR)
        releaseDate: 2025-05-05
        url: https://doi.org/10.1109/MIPR67560.2025.00026
        summary: Built a full-stack AI platform for cardiac image segmentation, disease classification, and real-time visualization, enabling end-to-end clinical decision-support workflows.

      - title: "Spotting the Fakes: A Deep Dive into GAN-Generated Face Detection"
        authors:
          - Ting Yu Tsai, Liangqiao Gui, Yineng Chen, Li Lin, Shu Hu, Connie W. Tsao, Xin Li, Shao Lin, Ming-Ching Chang, Hongtu Zhu, and Xin Wang
        publisher: ACM Transactions on Multimedia Computing, Communications and Applications
        releaseDate: 2025-07-24
        url: https://dl.acm.org/doi/10.1145/3742786
        summary: Surveyed GAN-generated face detection methods, datasets, evaluation settings, and open challenges across deep learning, physics-based, and physiology-based approaches.

      - title: "UU-Mamba: Uncertainty-aware U-Mamba for Cardiac Image Segmentation"
        authors:
          - Ting Yu Tsai, Li Lin, Shu Hu, Ming-Ching Chang, Hongtu Zhu, and Xin Wang
        publisher: In 2024 IEEE 7th International Conference on Multimedia Information Processing and Retrieval (MIPR)
        releaseDate: 2024-05-25
        url: https://arxiv.org/abs/2405.17496
        summary: Developed an uncertainty-aware cardiac image segmentation framework that improves robustness, generalization, and segmentation accuracy through Sharpness-Aware Minimization and uncertainty-guided loss design.

