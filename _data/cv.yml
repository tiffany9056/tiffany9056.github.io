  summary:     Ph.D. candidate in Computer Science with experience building multimodal LLM,
    machine learning, computer vision, and Python-based software systems for
    real-world applications. Developed end-to-end deep learning pipelines,
    evaluation workflows, and full-stack AI tools for medical imaging, video
    understanding, and intelligent decision-support systems. Brings strong
    hands-on experience in Python, PyTorch, TensorFlow, multimodal LLM
    inference, model evaluation, and software development, with a track record
    of translating research ideas into practical and scalable solutions.

