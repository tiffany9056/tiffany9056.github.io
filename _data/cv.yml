    Projects:
      - name: "ReDiPrune: Efficient Multimodal LLM Inference"
        summary: "A training-free token pruning framework for multimodal LLMs."
        highlights:
          - "Developed a training-free token pruning framework for multimodal LLMs that improves inference efficiency by pruning visual tokens before the vision-language projector."
          - "Designed a lightweight relevance-diversity scoring method to preserve query-relevant and non-redundant information."
          - "Enabled plug-and-play integration into existing multimodal LLM pipelines without retraining or architectural changes."
        start_date: 2026
        end_date: 2026
        url: https://github.com/UA-CVML/ReDiPrune

      - name: "IntelliCardiac: End-to-End AI Platform for Clinical Decision Support"
        summary: "A full-stack AI platform for cardiac MRI analysis and disease classification."
        highlights:
          - "Built an end-to-end AI platform for cardiac MRI segmentation, five-class disease classification, and real-time result visualization."
          - "Developed model pipelines, evaluation workflows, and deployment-oriented application components using Python, PyTorch, JavaScript, Node.js, and MongoDB."
          - "Achieved 92.6% overall segmentation accuracy and 98% classification accuracy in the two-stage disease classification pipeline."
        start_date: 2025
        end_date: 2025
        url: https://github.com/UA-CVML/IntelliCardiac

      - name: "Rat Seizure Video Analysis Framework"
        summary: "A deep learning and computer vision framework for automated seizure analysis from video."
        highlights:
          - "Developed a video analysis pipeline for automated rat seizure detection and stage classification."
          - "Built a scalable and reproducible framework for behavioral monitoring in epilepsy research using deep learning and computer vision."
        start_date: 2026
        end_date: 2026
        url: https://arxiv.org/abs/2603.26780

      - name: "UU-Mamba: Robust Cardiovascular Image Segmentation"
        summary: "A cardiovascular image segmentation framework designed for robustness and generalization."
        highlights:
          - "Developed and benchmarked a segmentation framework integrating Sharpness-Aware Minimization and an uncertainty-aware composite loss."
          - "Improved robustness and generalization for cardiovascular image segmentation across multiple medical imaging datasets."
          - "Achieved state-of-the-art performance on the ACDC, ImageCAS, and Aorta datasets."
        start_date: 2024
        end_date: 2024
        url: https://github.com/tiffany9056/UU-Mamba

      - name: "Automatic Image Exposure Classification and Enhancement System"
        summary: "A deep learning-based system for image exposure classification and enhancement."
        highlights:
          - "Built a deep learning system for automatic image exposure classification and enhancement."
          - "Achieved 0.91 classification accuracy and improved image quality to a level comparable to camera-captured results."
        start_date: 2021
        end_date: 2021
